<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PLATO Room Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'SF Mono','Fira Code',monospace}
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border-bottom:1px solid #30363d;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.header h1{color:#00E6D6;font-size:1.3rem}
.header h1 span{color:#8b949e;font-weight:normal;font-size:0.85rem;margin-left:0.5rem}
nav a{color:#00E6D6;text-decoration:none;margin-left:1rem;font-size:0.85rem}
nav a:hover{text-decoration:underline}
.container{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 60px)}
.sidebar{background:#161b22;border-right:1px solid #30363d;padding:1rem;overflow-y:auto}
.sidebar h2{color:#8b949e;font-size:0.8rem;text-transform:uppercase;margin:1rem 0 0.5rem;letter-spacing:1px}
.room-item{padding:0.6rem 0.8rem;border-radius:6px;cursor:pointer;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;transition:background 0.15s}
.room-item:hover{background:#1c2128}
.room-item.active{background:#1f2937;border-left:3px solid #00E6D6}
.room-name{color:#e6edf3;font-size:0.9rem}
.room-tiles{color:#8b949e;font-size:0.75rem}
.main{padding:2rem;overflow-y:auto}
.room-header{margin-bottom:1.5rem}
.room-header h2{color:#e6edf3;font-size:1.4rem;margin-bottom:0.3rem}
.room-header .desc{color:#8b949e;line-height:1.6;font-size:0.95rem}
.exits{display:flex;flex-wrap:wrap;gap:0.5rem;margin:1rem 0}
.exit-btn{background:#1c2128;border:1px solid #30363d;color:#00E6D6;padding:0.4rem 1rem;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.85rem;transition:all 0.15s}
.exit-btn:hover{background:#1f2937;border-color:#00E6D6}
.section{margin:1.5rem 0}
.section h3{color:#8b949e;font-size:0.8rem;text-transform:uppercase;margin-bottom:0.75rem;letter-spacing:1px}
.obj-list{display:flex;flex-wrap:wrap;gap:0.5rem}
.obj{background:#1c2128;border:1px solid #30363d;padding:0.3rem 0.8rem;border-radius:4px;font-size:0.85rem;color:#d2a8ff}
.agent-list .agent{background:#0d1117;border:1px solid #238636;padding:0.3rem 0.8rem;border-radius:4px;font-size:0.85rem;color:#3fb950;margin-right:0.5rem;margin-bottom:0.3rem;display:inline-block}
.terminal{background:#010409;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-top:1.5rem;font-size:0.85rem;line-height:1.8}
.terminal .prompt{color:#3fb950}
.terminal .cmd{color:#e6edf3}
.terminal .response{color:#8b949e}
.stats-bar{display:flex;gap:2rem;margin:1rem 0;padding:1rem;background:#161b22;border-radius:8px;border:1px solid #30363d}
.stat{text-align:center}
.stat .num{color:#00E6D6;font-size:1.5rem;font-weight:bold}
.stat .label{color:#8b949e;font-size:0.75rem}
.loading{text-align:center;padding:3rem;color:#8b949e}
.loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid #30363d;border-top-color:#00E6D6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#1c0a00;border:1px solid #f85149;border-radius:6px;padding:1rem;color:#f85149;font-size:0.85rem}
@media(max-width:768px){.container{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<div class="header">
  <h1>🔮 PLATO Explorer <span>Live Fleet Map</span></h1>
  <nav>
    <a href="/">Home</a>
    <a href="/developers.html">Developers</a>
    <a href="/status.html">Status</a>
    <a href="https://github.com/SuperInstance/plato">GitHub</a>
  </nav>
</div>

<div class="container">
  <div class="sidebar">
    <h2>Rooms</h2>
    <div id="roomList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
  <div class="main" id="main">
    <div class="loading">
      <div class="spinner"></div><br><br>
      Loading fleet...
    </div>
  </div>
</div>

<script>
const HOST = '147.224.38.131';
const MUD = `http://${HOST}:4042`;
const PLATO = `http://${HOST}:8847`;
const ARENA = `http://${HOST}:4044`;
let rooms = [];
let currentRoom = null;

async function api(base, path) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch(`${base}${path}`, {signal: ctrl.signal});
    clearTimeout(timer);
    return await r.json();
  } catch(e) { clearTimeout(timer); return {error: e.message}; }
}

async function loadRooms() {
  const data = await api(MUD, '/status');
  if (data.error) {
    document.getElementById('roomList').innerHTML = `<div class="error-box">Fleet unreachable: ${data.error}</div>`;
    return;
  }
  // Get room list from MUD help or PLATO
  const platoRooms = await api(PLATO, '/rooms');
  if (platoRooms.rooms) {
    rooms = platoRooms.rooms;
  } else {
    // Fallback: known rooms
    rooms = [
      {name:'harbor',tile_count:0},{name:'forge',tile_count:0},{name:'observatory',tile_count:0},
      {name:'dry-dock',tile_count:0},{name:'fishing-grounds',tile_count:0},{name:'fog-bank',tile_count:0}
    ];
  }
  renderRoomList();
  if (rooms.length > 0) enterRoom('harbor');
}

function renderRoomList() {
  const el = document.getElementById('roomList');
  el.innerHTML = rooms.map(r => `
    <div class="room-item" onclick="enterRoom('${r.name}')" id="room-${r.name}">
      <span class="room-name">${r.name}</span>
      <span class="room-tiles">${r.tile_count || 0}</span>
    </div>
  `).join('');
}

async function enterRoom(name) {
  // Update sidebar
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`room-${name}`);
  if (item) item.classList.add('active');
  
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"><div class="spinner"></div><br><br>Entering...</div>';
  
  // Connect to get room data
  const conn = await api(MUD, `/move?agent=explorer&room=${encodeURIComponent(name)}`);
  const look = await api(MUD, `/look?agent=explorer`);
  
  if (conn.error && look.error) {
    main.innerHTML = `<div class="error-box">Could not enter ${name}: ${conn.error}</div>`;
    return;
  }
  
  const room = look.room || conn.room || name;
  const desc = look.description || conn.description || '';
  const exits = look.exits || conn.exits || [];
  const objects = look.objects || [];
  const agents = look.agents_present || [];
  const tiles = look.room_tiles || look.tiles || 0;
  
  currentRoom = room;
  
  // Get arena leaderboard too
  const arena = await api(ARENA, '/leaderboard');
  const topAgents = arena.leaderboard ? arena.leaderboard.slice(0,5) : [];
  
  main.innerHTML = `
    <div class="room-header">
      <h2>${room}</h2>
      <div class="desc">${desc}</div>
    </div>
    
    <div class="stats-bar">
      <div class="stat"><div class="num">${tiles}</div><div class="label">Tiles</div></div>
      <div class="stat"><div class="num">${exits.length}</div><div class="label">Exits</div></div>
      <div class="stat"><div class="num">${agents.length}</div><div class="label">Agents</div></div>
      <div class="stat"><div class="num">${objects.length}</div><div class="label">Objects</div></div>
    </div>
    
    <div class="section">
      <h3>Exits</h3>
      <div class="exits">
        ${exits.map(e => `<button class="exit-btn" onclick="enterRoom('${e}')">→ ${e}</button>`).join('')}
      </div>
    </div>
    
    ${objects.length ? `
    <div class="section">
      <h3>Objects</h3>
      <div class="obj-list">${objects.map(o => `<span class="obj">${o}</span>`).join('')}</div>
    </div>` : ''}
    
    ${agents.length ? `
    <div class="section">
      <h3>Agents Present</h3>
      <div class="agent-list">${agents.map(a => `<span class="agent">● ${a}</span>`).join('')}</div>
    </div>` : ''}
    
    ${topAgents.length ? `
    <div class="section">
      <h3>Arena Leaderboard (Top 5)</h3>
      <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
        <tr style="color:#8b949e"><th style="text-align:left;padding:0.3rem">#</th><th style="text-align:left">Agent</th><th>Rating</th><th>W/L/D</th></tr>
        ${topAgents.map((a,i) => `<tr style="border-top:1px solid #30363d"><td style="padding:0.3rem;color:#8b949e">${i+1}</td><td style="color:#e6edf3">${a.agent||a.name||'?'}</td><td style="text-align:center;color:#00E6D6">${(a.rating||a.mu||0).toFixed(0)}</td><td style="text-align:center;color:#8b949e">${a.wins||0}/${a.losses||0}/${a.draws||0}</td></tr>`).join('')}
      </table>
    </div>` : ''}
    
    <div class="terminal">
      <div><span class="prompt">$</span> <span class="cmd">curl http://${HOST}:4042/move?agent=mybot&room=${room}</span></div>
      <div class="response">→ ${desc.substring(0,80)}${desc.length>80?'...':''}</div>
    </div>
  `;
}

loadRooms();
</script>
</body>
</html>
